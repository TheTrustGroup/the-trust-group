<?xml version="1.0" encoding="UTF-8"?>
<!--
  The Trust Group — canonical mark.
  Gold linear gradient. 60x60 viewBox. Transparent background.
  Reflects the 2026 rebrand: rotated diamond frame, 4 quadrant blocks
  with descending opacity, crosshair, and corner registration brackets.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none" aria-label="The Trust Group">
  <defs>
    <linearGradient id="ttgMark" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8d4a8"/>
      <stop offset="100%" stop-color="#b8944a"/>
    </linearGradient>
  </defs>

  <!-- Outer diamond frame -->
  <rect x="4" y="4" width="52" height="52" rx="2" fill="none" stroke="url(#ttgMark)" stroke-width="0.75" transform="rotate(45 30 30)"/>
  <!-- Inner diamond -->
  <rect x="14" y="14" width="32" height="32" rx="1" fill="none" stroke="url(#ttgMark)" stroke-width="0.5" opacity="0.45" transform="rotate(45 30 30)"/>

  <!-- Four quadrants: AI · Strategy · Defense · Scale -->
  <rect x="17" y="17" width="12" height="12" rx="0.5" fill="url(#ttgMark)" opacity="0.9"/>
  <rect x="31" y="17" width="12" height="12" rx="0.5" fill="url(#ttgMark)" opacity="0.55"/>
  <rect x="17" y="31" width="12" height="12" rx="0.5" fill="url(#ttgMark)" opacity="0.55"/>
  <rect x="31" y="31" width="12" height="12" rx="0.5" fill="url(#ttgMark)" opacity="0.25"/>

  <!-- Crosshair -->
  <line x1="30" y1="16" x2="30" y2="44" stroke="url(#ttgMark)" stroke-width="0.5" opacity="0.3"/>
  <line x1="16" y1="30" x2="44" y2="30" stroke="url(#ttgMark)" stroke-width="0.5" opacity="0.3"/>

  <!-- Corner registration brackets -->
  <path d="M4 12 L4 4 L12 4" stroke="url(#ttgMark)" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M48 4 L56 4 L56 12" stroke="url(#ttgMark)" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M56 48 L56 56 L48 56" stroke="url(#ttgMark)" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M12 56 L4 56 L4 48" stroke="url(#ttgMark)" stroke-width="1" fill="none" stroke-linecap="round"/>
</svg>
